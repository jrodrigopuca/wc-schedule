# Tournament-aware 2-hourly refresh of public/data/matches.json.
#
# A cron fires every 2 hours; the script decides at run time
# whether to do a full fetch+rotate, skip (already refreshed within the
# cadence), or be a complete no-op (outside both tournament windows). See
# scripts/refresh/window.ts and design.md §10.
#
# SAFETY: the script validates the upstream payload with the SAME Zod schema
# the client uses BEFORE any file is rotated. A bad run exits non-zero and
# leaves matches.json + history untouched — the base JSON is never corrupted.
#
# DEPLOY: GITHUB_TOKEN pushes do NOT trigger other workflow runs (GitHub's
# anti-loop policy). After a successful data commit we explicitly dispatch
# deploy.yml via `gh workflow run` so the new matches.json reaches GitHub Pages.
#
# ONE-TIME SETUP: add repo secret FOOTBALL_DATA_TOKEN (Settings → Secrets and
# variables → Actions). Without it the job fails fast and changes nothing.
name: Refresh matches.json

on:
  schedule:
    # Every 2 hours — low lag for finished scores + freshly-drawn bracket
    # slots during the tournament, while avoiding the congested on-the-hour
    # slot. window.ts gates the real work: tournament runs fetch every time,
    # near runs still throttle to 48h, and off-season runs are a complete
    # no-op. (GitHub may delay/skip scheduled runs under load, so treat ~2h
    # as best-case, not a hard guarantee.)
    - cron: '0 */2 * * *'
  workflow_dispatch:

# Serialize refreshes so two runs never race on the same commit.
concurrency:
  group: refresh-matches
  cancel-in-progress: false

permissions:
  contents: write
  actions: write   # required for `gh workflow run` (workflow_dispatch trigger)

jobs:
  refresh:
    name: Refresh
    runs-on: ubuntu-latest
    outputs:
      mode: ${{ steps.refresh_run.outputs.refresh_mode }}
      fetched: ${{ steps.refresh_run.outputs.refresh_fetched }}
      fetched_count: ${{ steps.refresh_run.outputs.refresh_fetched_count }}
      changed: ${{ steps.refresh_run.outputs.refresh_changed }}
      reason: ${{ steps.refresh_run.outputs.refresh_reason }}
      last_date: ${{ steps.refresh_run.outputs.refresh_last_date }}
      history_file: ${{ steps.refresh_run.outputs.refresh_history_file }}
      pruned_count: ${{ steps.refresh_run.outputs.refresh_pruned_count }}
      outcome: ${{ steps.refresh_run.outcome }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          # Full history is required to read the previous commit date of
          # matches.json (the "last refreshed" record — design.md §10.1).
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Refresh (window-aware)
        id: refresh_run
        continue-on-error: true
        env:
          FOOTBALL_DATA_TOKEN: ${{ secrets.FOOTBALL_DATA_TOKEN }}
          REFRESH_REPORT_PATH: .artifacts/refresh-report.json
        run: pnpm run refresh:matches

      - name: Upload refresh artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: refresh-report
          path: .artifacts/refresh-report.json
          if-no-files-found: ignore

      - name: Fail workflow when refresh script fails
        if: steps.refresh_run.outcome == 'failure'
        run: exit 1

      - name: Commit and deploy if changed
        if: steps.refresh_run.outcome == 'success'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if ! git diff --quiet -- public/data/; then
            git config user.name "wc-schedule-bot"
            git config user.email "bot@users.noreply.github.com"
            git add public/data/
            git commit -m "chore(data): refresh matches.json"
            git push
            # GITHUB_TOKEN pushes don't trigger other workflows (GitHub anti-loop
            # policy), so we dispatch deploy.yml explicitly here.
            gh workflow run deploy.yml
            echo "Data changed — committed, pushed, and deploy dispatched."
          else
            echo "No data change — nothing to commit."
          fi

      - name: Data snapshot
        if: always()
        run: node scripts/data-snapshot.cjs

  refresh-report:
    name: Refresh report
    runs-on: ubuntu-latest
    needs: refresh
    if: always()
    steps:
      - name: Download refresh artifact
        uses: actions/download-artifact@v5
        with:
          name: refresh-report
          path: .artifacts
        continue-on-error: true

      - name: Summarize refresh outcome
        env:
          REFRESH_OUTCOME: ${{ needs.refresh.outputs.outcome }}
          REFRESH_MODE: ${{ needs.refresh.outputs.mode }}
          REFRESH_FETCHED: ${{ needs.refresh.outputs.fetched }}
          REFRESH_FETCHED_COUNT: ${{ needs.refresh.outputs.fetched_count }}
          REFRESH_CHANGED: ${{ needs.refresh.outputs.changed }}
          REFRESH_REASON: ${{ needs.refresh.outputs.reason }}
          REFRESH_LAST_DATE: ${{ needs.refresh.outputs.last_date }}
          REFRESH_HISTORY_FILE: ${{ needs.refresh.outputs.history_file }}
          REFRESH_PRUNED_COUNT: ${{ needs.refresh.outputs.pruned_count }}
        run: |
          {
            printf '## Refresh verdict\n\n'
            printf -- '- outcome: `%s`\n' "$REFRESH_OUTCOME"
            printf -- '- mode: `%s`\n' "$REFRESH_MODE"
            printf -- '- fetched upstream: `%s`\n' "$REFRESH_FETCHED"
            printf -- '- matches received: `%s`\n' "$REFRESH_FETCHED_COUNT"
            printf -- '- changed dataset: `%s`\n' "$REFRESH_CHANGED"
            printf -- '- reason: `%s`\n' "$REFRESH_REASON"
            printf -- '- previous refresh date: `%s`\n' "$REFRESH_LAST_DATE"
            printf -- '- rotated history file: `%s`\n' "$REFRESH_HISTORY_FILE"
            printf -- '- pruned snapshots: `%s`\n' "$REFRESH_PRUNED_COUNT"
          } >> "$GITHUB_STEP_SUMMARY"
