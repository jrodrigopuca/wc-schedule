# GitHub Pages deploy for wc-schedule.
#
# ONE-TIME REPO SETTING REQUIRED:
#   Settings → Pages → Build and deployment → Source: GitHub Actions
#
# Without that setting flipped, the deploy step will fail with a
# "Pages site not found" error. Once set, every push to `main`
# rebuilds and publishes; manual runs are available via the
# Actions tab (workflow_dispatch).
#
# This uses GitHub's NATIVE Pages deployment (`actions/deploy-pages@v4`)
# rather than the third-party gh-pages branch flow. It does not push a
# branch — it uploads the build artifact and the Pages runtime serves it
# directly.
name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Only one Pages deploy at a time; cancel queued ones so the latest
# push wins. We do NOT cancel an in-progress run mid-flight, because
# that risks a half-published artifact — the Pages action runs as one
# atomic unit.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
