<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#16A34A" />

    <!-- Icons. Paths use %BASE_URL% so they resolve under the GH Pages
         repo path (`/wc-schedule/`) without hardcoding it. The PWA
         manifest itself is auto-injected by vite-plugin-pwa. -->
    <link rel="icon" href="%BASE_URL%favicon.ico" sizes="any" />
    <link rel="icon" type="image/svg+xml" href="%BASE_URL%favicon.svg" />
    <link rel="apple-touch-icon" href="%BASE_URL%apple-touch-icon-180x180.png" />

    <title>WC Schedule — Mundial 2026</title>
    <meta
      name="description"
      content="Calendario y avisos del Mundial 2026: vista rápida del próximo partido en tu zona horaria, lista del día y aviso 15 minutos antes de cada partido. Funciona offline."
    />

    <!-- Open Graph -->
    <meta property="og:title" content="WC Schedule — Mundial 2026" />
    <meta
      property="og:description"
      content="Vista rápida del próximo partido del Mundial 2026 en tu zona horaria. Funciona offline y te avisa 15 minutos antes."
    />
    <meta property="og:url" content="https://jrodrigopuca.github.io/wc-schedule/" />
    <meta
      property="og:image"
      content="https://jrodrigopuca.github.io/wc-schedule/pwa-512x512.png"
    />
    <meta property="og:type" content="website" />
    <meta property="og:locale" content="es_AR" />
    <meta property="og:locale:alternate" content="en_US" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="WC Schedule — Mundial 2026" />
    <meta
      name="twitter:description"
      content="Vista rápida del próximo partido del Mundial 2026 en tu zona horaria. Funciona offline."
    />
    <meta
      name="twitter:image"
      content="https://jrodrigopuca.github.io/wc-schedule/pwa-512x512.png"
    />

    <script>
      ;(function () {
        try {
          var t = localStorage.getItem('wc-theme')
          if (t === 'dark' || t === 'light') {
            document.documentElement.setAttribute('data-theme', t)
          }
        } catch (_) {
          /* localStorage blocked → fall through to OS preference */
        }
      })()
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
